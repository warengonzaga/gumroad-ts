name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - uses: wgtechlabs/release-build-flow-action@v1.7.0
        with:
          github-token: ${{ secrets.GH_PAT }}
          commit-convention: clean-commit
